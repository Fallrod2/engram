# For detailed configuration reference documentation, visit:
# https://supabase.com/docs/guides/local-development/cli/config
#
# engram n'utilise que Postgres (Hono/Drizzle/postgres-js, mono-utilisateur, sans auth).
# Ce config.toml est volontairement minimal : seuls `db`, `api` et `studio` sont activés.
# Auth, storage, realtime, edge_runtime, analytics et le serveur mail sont désactivés
# pour ne pas démarrer une douzaine de conteneurs Docker inutiles.
project_id = "engram"

[api]
enabled = true
# Port to use for the API URL.
port = 54321
# Schemas to expose in your API.
schemas = ["public", "graphql_public"]
# Extra schemas to add to the search_path of every request.
extra_search_path = ["public", "extensions"]
# The maximum number of rows returns from a view, table, or stored procedure.
max_rows = 1000

[db]
# Port to use for the local database URL.
port = 54322
# Port used by db diff command to initialize the shadow database.
shadow_port = 54320
# Maximum amount of time to wait for health check when starting the local database.
health_timeout = "2m"
# The database major version to use.
major_version = 17

[db.pooler]
enabled = false

[db.migrations]
# If disabled, migrations will be skipped during a db push or reset.
enabled = true
schema_paths = []

[db.seed]
# If enabled, seeds the database after migrations during a db reset.
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
# Port to use for Supabase Studio.
port = 54323
# External URL of the API server that frontend connects to.
api_url = "http://127.0.0.1"

[realtime]
enabled = false

[local_smtp]
enabled = false

[storage]
enabled = false

# --- Auth (application gate, spec §4.3) -------------------------------------
# The local stack keeps GoTrue DISABLED so no extra container starts and no local
# login path is shipped (spec §1.2). The closed-signup posture is committed HERE,
# in the SAME commit as the server auth middleware (spec §1.2 rule): if a
# maintainer ever flips `enabled = true` to test auth locally, sign-ups are
# ALREADY closed — never open them in a separate step (the Supabase local default
# is OPEN). Cloud sign-ups are closed in the dashboard (spec §1.2).
[auth]
enabled = false
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = false # inscriptions fermées (parité prod)

[auth.email]
enable_signup = false
enable_confirmations = false # pas de SMTP local

[edge_runtime]
enabled = false

[analytics]
enabled = false
