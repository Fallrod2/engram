<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />

    <!-- Favicon: SVG for modern browsers, a real 32×32 .ico for legacy/crawlers,
         and a 180×180 PNG for iOS/Safari home screens (which ignore SVG for
         apple-touch-icon). All static files in public/, so none soft-404 to the
         SPA HTML. Rasters generated by scripts/gen-favicon-ico.mjs. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" sizes="32x32" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!--
      Marketing title + social meta for the public landing (landing spec §4).
      One static index.html serves every route, so this title also shows on
      /login (harmless); the authenticated app resets document.title to 'engram'
      at mount, and the landing sets its own localized title + description. The
      social image is served from the canonical absolute origin so link unfurls
      (Facebook/LinkedIn/WhatsApp) resolve it regardless of the sharing context.
    -->
    <title>engram — révision par répétition espacée, cartes générées par IA</title>
    <meta
      name="description"
      content="engram programme tes révisions par répétition espacée (FSRS) et génère des cartes depuis tes notes et tes photos de cours. Self-hosted, open source, gratuit."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="engram" />
    <meta property="og:url" content="https://engram.alexabriel.com/" />
    <meta
      property="og:title"
      content="engram — révision par répétition espacée, cartes générées par IA"
    />
    <meta
      property="og:description"
      content="Révise ce qui est dû, pile quand c'est dû. Génère des cartes depuis tes notes et photos de cours. Self-hosted, open source."
    />
    <meta property="og:image" content="https://engram.alexabriel.com/landing/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="engram — révision par répétition espacée, cartes générées par IA"
    />
    <meta
      name="twitter:description"
      content="Révise ce qui est dû, pile quand c'est dû. Cartes générées par IA depuis tes notes. Self-hosted, open source."
    />
    <meta name="twitter:image" content="https://engram.alexabriel.com/landing/og.png" />
    <!-- Anti-FOUC : applique le thème stocké avant le premier paint. -->
    <script>
      ;(function () {
        try {
          var t = localStorage.getItem('engram-theme')
          if (t === 'light') {
            document.documentElement.setAttribute('data-theme', 'light')
          } else if (t !== 'system') {
            /* Défaut projet : dark, même sans préférence stockée. */
            document.documentElement.setAttribute('data-theme', 'dark')
          }
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
